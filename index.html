<div class="card mb-4">
  <div class="card-body bg-light">
    <div class="row g-3 align-items-end">
      <div class="col-md-4">
        <label class="form-label small fw-bold">ตั้งแต่เดือน:</label>
        <select id="select-start-month" class="form-select"></select>
      </div>
      <div class="col-md-4">
        <label class="form-label small fw-bold">ถึงเดือนปัจจุบัน:</label>
        <select id="select-end-month" class="form-select"></select>
      </div>
      <div class="col-md-4">
        <button class="btn btn-primary w-100" onclick="refreshData()">
          <i class="bi bi-filter"></i> กรองข้อมูล
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBFAcu7VV5MIpI4feJMBWsjYp9ZcUHbnXYi4Z59bNZHYzdqeyB9hNp2nTizDjbVqhh/exec"; 

  // ปรับกราฟ Trend เป็นแท่งคู่
  function updateTrendChart(chartData) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (window.myTrendChart) window.myTrendChart.destroy();
    
    window.myTrendChart = new Chart(ctx, {
      type: 'bar', // เปลี่ยนจาก line เป็น bar
      data: {
        labels: chartData.months,
        datasets: [
          { label: 'รายรับ', data: chartData.income, backgroundColor: '#0d6efd' },
          { label: 'รายจ่าย', data: chartData.expense, backgroundColor: '#dc3545' }
        ]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // ปรับการโหลด Tab โครงการ (Column A-G)
  function loadProjectTable(rows) {
    $('#table-projects').DataTable({
      data: rows,
      columns: [
        { title: "ลำดับที่ (A)", data: 0 },
        { title: "ชื่อแผนงาน/โครงการ (B)", data: 1, width: "25%" },
        { title: "จำนวนเงิน (C)", data: 2 },
        { title: "ผู้รับผิดชอบ (D)", data: 3 },
        { title: "เบิกจ่ายแล้ว (E)", data: 4 },
        { 
          title: "ความคืบหน้า", 
          render: function(d, t, row) { 
            return renderProgress(parseMoney(row[4]), parseMoney(row[2]), "bg-warning"); 
          } 
        },
        { title: "วันที่จ่าย (F)", data: 5 },
        { title: "หมายเหตุ (G)", data: 6 }
      ],
      destroy: true,
      scrollX: true
    });
  }

  // ฟังก์ชันโหลดข้อมูลเริ่มต้นและทำ Dropdown
  function refreshData() {
    let start = $('#select-start-month').val();
    let end = $('#select-end-month').val();
    
    $('#loading-overlay').fadeIn();
    $.get(WEB_APP_URL + `?action=getSummaryData&startMonth=${start || ''}&endMonth=${end || ''}`, function(data) {
      // อัปเดต Dropdown เดือนถ้ายังไม่มีข้อมูล
      if($('#select-start-month option').length === 0) {
        data.allMonths.forEach((m, i) => {
          $('#select-start-month').append(new Option(m, m));
          $('#select-end-month').append(new Option(m, m));
        });
        // ตั้งค่า Default: เดือนแรก ถึง เดือนปัจจุบัน (เดือนล่าสุดที่มีข้อมูล)
        $('#select-start-month').val(data.allMonths[0]);
        $('#select-end-month').val(data.chart.months[data.chart.months.length - 1]);
      }
      
      showDashboard(data); // แสดงตัวเลขสรุป
      updateTrendChart(data.chart); // แสดงกราฟแท่งคู่
      $('#loading-overlay').fadeOut();
    });
  }
</script>
